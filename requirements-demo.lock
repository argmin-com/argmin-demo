# Minimal dependency set for the memory-only local Argmin demo.
#
# The demo launcher intentionally installs this file instead of the production
# lock so a fresh laptop run does not download Kafka, Redis, Neo4j, scientific
# Python, OpenTelemetry, load-test, or cloud-adapter packages. The application
# is run from src/ via PYTHONPATH, so no editable package build is needed.
